<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakımdayız | Arslan Hukuk & Danışmanlık</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0e17;
            --text-light: #e2e8f0;
            --text-dim: #94a3b8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Arkaplan Efektleri */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(10, 14, 23, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse 6s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--text-dim);
            display: block;
            margin-top: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-style: italic;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, var(--text-dim));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeUp 1s ease 0.5s forwards;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-dim);
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1s ease 0.8s forwards;
        }

        .contact-info {
            display: flex;
            gap: 2rem;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 1s ease 1.1s forwards;
        }

        .contact-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-light);
            backdrop-filter: blur(10px);
        }

        .contact-item:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-3px);
        }

        .contact-item svg {
            width: 20px;
            height: 20px;
            fill: var(--gold);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .contact-info { flex-direction: column; gap: 1rem; }
            .bg-glow { width: 400px; height: 400px; }
        }
    </style>
    <meta name="google-site-verification" content="-B33b_EFkmxkenc03w7_HW93zOoQG8uKRRbSUZZQ7Bk" />
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="logo">
            ARSLAN
            <span class="logo-subtitle">HUKUK & DANIŞMANLIK</span>
        </div>

        <h1>Yakında...</h1>
        
        <p>Sizlere daha modern ve iyi bir deneyim sunabilmek için web sitemizi yeniliyoruz.<br>Kısa bir süre sonra tekrar hizmetinizde olacağız.</p>

        <div class="contact-info">
            <a href="mailto:info@arslannhukuk.com.tr" class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                info@arslannhukuk.com.tr
            </a>
            <!-- Telefon numarası eklenebilir -->
        </div>
    </div>
</body>
</html>
